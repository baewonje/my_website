<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bae Wonje | Product Manager</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      font-family: 'Arial';
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    button {
      padding: 14px 30px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      background: #38bdf8;
      color: #0f172a;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: white;
    }

    body, html {
  margin: 0;
  height: 100%;
}

.hero {
  position: relative;
  height: 100vh;
  background-size: cover;
  background-position: center;
  transition: background-image 1.5s ease-in-out;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}

.hero-content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
}

.hero-content h1 {
  font-size: 60px;
  margin-bottom: 10px;
}

.enter-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 28px;
  background: white;
  color: black;
  text-decoration: none;
  border-radius: 30px;
  font-weight: bold;
  transition: 0.3s;
}

.enter-btn:hover {
  background: #2563eb;
  color: white;
}
  </style>
</head>

<body>
<div class="hero">
  <div class="overlay"></div>
  <div class="hero-content">
    <h1>Bae Wonje</h1>
    <p>Product Manager</p>
    <a href="main.html" class="enter-btn">Enter</a>
  </div>
</div>

<script>
</script>

</body>

  <script>
const images = [
  "bg1.jpg",
  "bg2.jpg",
  "bg3.jpg",
  "bg4.jpg"
];

const hero = document.querySelector(".hero");

let current = Math.floor(Math.random() * images.length);
hero.style.backgroundImage = `url(${images[current]})`;

setInterval(() => {
  current = (current + 1) % images.length;
  hero.style.backgroundImage = `url(${images[current]})`;
}, 10000);
</script>
</body>
</html>
